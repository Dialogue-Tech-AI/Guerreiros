# Nginx reverse proxy com SSL para Altese
# Certificados em /etc/nginx/ssl/
# Frontend Docker escuta em 8080 e faz proxy interno de /api e /socket.io

upstream frontend {
    server 127.0.0.1:8080;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Redirecionar HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name alteseai.dialoguetech.com.br alteseai-app.dialoguetech.com.br;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alteseai.dialoguetech.com.br alteseai-app.dialoguetech.com.br;

    ssl_certificate     /etc/nginx/ssl/alteseai.pem;
    ssl_certificate_key /etc/nginx/ssl/alteseai.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}
